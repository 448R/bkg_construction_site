{% extends 'bkg/base.html' %}
{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow border-0 p-4">
                    <h2 class="mb-4">Envoyez-nous un message</h2>
                    {% if submitted %}
                        <div class="alert alert-success">Votre message a été envoyé avec succès !</div>
                    {% endif %}
                    <form id="contactForm" method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Nom complet</label>
                            <input type="text" name="name" class="form-control" value="{{ contact_name }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" value="{{ contact_email }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Téléphone</label>
                            <input type="tel" name="phone" class="form-control" value="{{ contact_phone }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Votre projet</label>
                            <textarea name="message" class="form-control" rows="6" required>{{ contact_message }}</textarea>
                        </div>
                        <button id="submitBtn" type="submit" class="btn btn-primary btn-lg w-100">Envoyer la demande</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
